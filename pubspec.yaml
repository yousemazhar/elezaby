name: elezaby
description: "El Ezaby pharmacy shopping app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  google_sign_in: ^6.2.1

  # Image picking
  image_picker: ^1.1.2

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.3.0

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # Images
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
